name: buhairi_academy_application
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  smooth_page_indicator: ^2.0.1
  lottie: ^3.3.2
  shared_preferences: ^2.5.4
  curved_navigation_bar: ^1.0.6
  fan_carousel_image_slider: ^1.3.1
  # ملاحظة: تأكد أن هذه المكتبة متوافقة مع إصداراتك
  animated_contact_us: ^0.0.8
  url_launcher: ^6.3.2
  flutter_gen_ai_chat_ui: ^2.5.0
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  google_sign_in: 6.3.0
  carousel_slider: ^5.1.2
  firebase_storage: ^13.1.0
  image_picker: ^1.2.1
  geocoding: ^4.0.0
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/captin_mustafa.png
    - assets/images/teakwondo.png
    - assets/images/teakwondo-boy.png
    - assets/animations/Fist Bump.json
    - assets/images/logo_white.png
    - assets/animations/Scroll down.json
    - assets/animations/Facebook.json
    - assets/animations/Instagram.json
    - assets/animations/whatsapp_loop.json
    - assets/animations/Phone Call.json

  fonts:
    - family: welcomeText
      fonts:
        - asset: assets/fonts/BBHBartle-Regular.ttf
    - family: LoginSignup
      fonts:
        - asset: assets/fonts/MerriweatherSans-Italic-VariableFont_wght.ttf